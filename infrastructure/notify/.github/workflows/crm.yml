name: CRM CI

on:
  push:
    paths:
      - "services/crm/**"
      - ".github/workflows/crm.yml"
  pull_request:
    paths:
      - "services/crm/**"
      - ".github/workflows/crm.yml"

jobs:
  crm-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        if: ${{ hashFiles('services/crm/package.json') != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        if: ${{ hashFiles('services/crm/package.json') != '' }}
        working-directory: services/crm
        run: npm ci

      - name: Build
        if: ${{ hashFiles('services/crm/package.json') != '' }}
        working-directory: services/crm
        run: npm run build --if-present

      - name: No package.json found
        if: ${{ hashFiles('services/crm/package.json') == '' }}
        run: echo "services/crm is scaffolded; add package.json to enable full CI."

