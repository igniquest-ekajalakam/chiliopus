name: Admin UI CI

on:
  push:
    paths:
      - "apps/admin-ui/**"
      - ".github/workflows/admin-ui.yml"
  pull_request:
    paths:
      - "apps/admin-ui/**"
      - ".github/workflows/admin-ui.yml"

jobs:
  admin-ui-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        if: ${{ hashFiles('apps/admin-ui/package.json') != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        if: ${{ hashFiles('apps/admin-ui/package.json') != '' }}
        working-directory: apps/admin-ui
        run: npm ci

      - name: Build
        if: ${{ hashFiles('apps/admin-ui/package.json') != '' }}
        working-directory: apps/admin-ui
        run: npm run build --if-present

      - name: No package.json found
        if: ${{ hashFiles('apps/admin-ui/package.json') == '' }}
        run: echo "apps/admin-ui is scaffolded; add package.json to enable full CI."

