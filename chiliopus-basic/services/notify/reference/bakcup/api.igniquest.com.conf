<VirtualHost 103.77.155.178:80>
	ServerName api.igniquest.com
	ServerAlias www.api.igniquest.com
	ServerAdmin webmaster@api.igniquest.com
	DocumentRoot /home/igniques/public_html/api
	UseCanonicalName Off
	ScriptAlias /cgi-bin/ /home/igniques/public_html/api/cgi-bin/
          
        ProxyPreserveHost On
        ProxyPass / http://127.0.0.1:9090/api/
        ProxyPassReverse / http://127.0.0.1:9090/api/

	CustomLog /usr/local/apache/domlogs/api.igniquest.com.bytes bytes
	CustomLog /usr/local/apache/domlogs/api.igniquest.com.log combined
	ErrorLog /usr/local/apache/domlogs/api.igniquest.com.error.log

	# Custom settings are loaded below this line (if any exist)
	# IncludeOptional "/usr/local/apache/conf/userdata/igniques/api.igniquest.com/*.conf"

	<IfModule mod_setenvif.c>
		SetEnvIf X-Forwarded-Proto "^https$" HTTPS=on
	</IfModule>

	<IfModule mod_userdir.c>
		UserDir disabled
		UserDir enabled igniques
	</IfModule>

	<IfModule mod_suexec.c>
		SuexecUserGroup igniques igniques
	</IfModule>

	<IfModule mod_suphp.c>
		suPHP_UserGroup igniques igniques
		suPHP_ConfigPath /home/igniques
	</IfModule>

	<IfModule mod_ruid2.c>
		RMode config
		RUidGid igniques igniques
	</IfModule>

	<IfModule itk.c>
		AssignUserID igniques igniques
	</IfModule>

	<Directory "/home/igniques/public_html/api">
		Options -Indexes -FollowSymLinks +SymLinksIfOwnerMatch
		AllowOverride All Options=ExecCGI,Includes,IncludesNOEXEC,Indexes,MultiViews,SymLinksIfOwnerMatch
	</Directory>

</VirtualHost>

<VirtualHost 103.77.155.178:80>
	ServerName webmail.api.igniquest.com

	<IfModule mod_proxy.c>
		ProxyRequests Off
		ProxyPreserveHost On
		ProxyVia Full
		ProxyPass / http://127.0.0.1:2095/
		ProxyPassReverse / http://127.0.0.1:2095/

		<Proxy *>
			AllowOverride All
		</Proxy>
	</IfModule>

	<IfModule mod_security2.c>
		SecRuleEngine Off
	</IfModule>

</VirtualHost>

